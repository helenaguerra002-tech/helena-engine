name: Daily Podcast

on:
  schedule:
    - cron: '45 8 * * 1-5'  # GMT (Oct–Mar): 8:45 AM UTC → arrives ~9 AM London
    - cron: '45 7 * * 1-5'  # BST (Mar–Oct): 7:45 AM UTC → arrives ~9 AM London
  workflow_dispatch:         # allows manual trigger from GitHub UI

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger daily podcast
        run: |
          response=$(curl -s -X POST https://helena-alpha-engine.onrender.com/podcast/trigger-daily -m 600)
          echo "$response"
          echo "$response" | grep -q '"telegram_sent":true' && echo "SUCCESS: podcast sent to Telegram" || echo "WARNING: podcast generated but Telegram delivery failed"
